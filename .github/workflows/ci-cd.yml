name: Wearables CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-test-package:
    name: Build, Test, and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests and package application
        run: mvn -B clean verify

      - name: Upload packaged JAR
        uses: actions/upload-artifact@v4
        with:
          name: wearables-spring-boot-jar
          path: target/*.jar
